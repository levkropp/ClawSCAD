name: Build macOS (dmg)

# macOS runners cost 10x — only run on version tags or manual trigger
on:
  push:
    tags: ['v*', '20*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version='$VERSION'; fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');"

      - name: Cache OpenSCAD vendor binary
        uses: actions/cache@v4
        with:
          path: vendors/
          key: openscad-macos-2026.03.16

      - name: Download OpenSCAD
        run: npm run download-openscad

      - name: Build renderer
        run: npm run build:renderer

      - name: Build macOS dmg
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dmg
        uses: actions/upload-artifact@v4
        with:
          name: ClawSCAD-macOS-dmg
          path: release/*.dmg
          if-no-files-found: warn

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
