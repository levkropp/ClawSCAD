name: Build Windows (exe)

on:
  push:
    branches: [main]
    tags: ['v*', '20*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          D="${GITHUB_REF_NAME#v}"
          SEMVER="${D:0:4}.$((10#${D:4:2})).$((10#${D:6:2}))"
          npm version --no-git-tag-version "$SEMVER"

      - name: Cache OpenSCAD vendor binary
        uses: actions/cache@v4
        with:
          path: vendors/
          key: openscad-windows-2026.03.16

      - name: Download OpenSCAD
        run: npm run download-openscad

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Windows installer
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ClawSCAD-Windows-Setup
          path: release/*.exe
          if-no-files-found: warn

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
